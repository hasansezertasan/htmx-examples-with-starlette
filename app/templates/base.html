<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
              rel="stylesheet"
              integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
              crossorigin="anonymous">
        <script src="https://unpkg.com/htmx.org@1.9.10"
                integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC"
                crossorigin="anonymous"></script>
        <style>
            body {
                padding-top: 60px;
            }

            @media (max-width: 979px) {
                body {
                    padding-top: 0px;
                }
            }
        </style>
        {% block header %}
        {% endblock header %}
    </head>
    <body class="d-flex flex-column h-100">
        <header>
            <nav class="navbar navbar-expand-lg navbar-dark fixed-top bg-dark">
                <!-- Container wrapper -->
                <div class="container-fluid">
                    <a class="navbar-brand" href="{{ url_for("root") }}">HTMX Examples with Starlette</a>
                    <!-- Toggle button -->
                    <button class="navbar-toggler"
                            type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#navbarSupportedContent"
                            aria-controls="navbarSupportedContent"
                            aria-expanded="false"
                            aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse"
                         id="navbarSupportedContent"
                         hx-target="#main">
                        <ul class="navbar-nav me-auto mb-2 mb-md-0">
                            <li class="nav-item">
                                <a class="nav-link" aria-current="page" href="{{ url_for("root") }}">Homepage</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{{ url_for("random-number") }}">Random Number</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link"
                                   hx-get="{{ url_for("dynamic-content") }}"
                                   href="{{ url_for("dynamic-content") }}"
                                   hx-push-url="true">Dynamic Content</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
        <main class="flex-shrink-0">
            <div class="container py-5" id="main">
                {% block content %}
                {% endblock content %}
            </div>
            {% block script %}
            {% endblock script %}
        </main>
        <footer class="footer mt-auto py-3 bg-dark fixed-bottom">
            <div class="container text-center">
                <span class="text-muted">Copyright &copy; HTMX Examples with Starlette</span>
            </div>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
                crossorigin="anonymous"></script>
    </body>
</html>
